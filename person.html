<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person UI Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* Mock the dark topography background */
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
    </style>
</head>

<body class="antialiased">

    <!-- Standalone Person Overlay Component -->
    <div class="relative flex flex-col items-center group cursor-pointer">

        <!-- Info Card (Floats above) -->
        <div
            class="absolute bottom-full mb-2 opacity-90 group-hover:opacity-100 group-hover:-translate-y-1 transition-all duration-300 ease-out z-10 w-max">
            <div
                class="bg-black/80 backdrop-blur-xl border border-white/10 rounded-2xl p-3 shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex items-center gap-3 relative origin-bottom">

                <!-- Avatar -->
                <div class="relative">
                    <img src="https://i.pravatar.cc/100?img=11" alt="Avatar"
                        class="w-10 h-10 rounded-full border border-gray-700 object-cover">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-black rounded-full">
                    </div>
                </div>

                <!-- Details -->
                <div class="pr-2">
                    <div class="text-white text-[13px] font-semibold tracking-wide">David Chen</div>
                    <div class="text-gray-400 text-[10px] leading-tight mt-0.5">Building FinTech at Genesis</div>
                </div>

                <!-- Match Tag -->
                <div
                    class="ml-2 bg-green-500/10 border border-green-500/30 text-green-400 text-[10px] uppercase tracking-wider font-bold px-2 py-1.5 rounded-lg">
                    98% Match
                </div>

                <!-- Down Arrow Tip -->
                <div
                    class="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-3 h-3 bg-black/80 border-b border-r border-white/10 rotate-45">
                </div>
            </div>
        </div>

        <!-- Connection Tether (Drapes down to the node) -->
        <div class="w-px h-8 bg-gradient-to-b from-white/40 to-transparent absolute bottom-1/2 translate-y-1"></div>

        <!-- Anchor Node (Nestles on the topography) -->
        <div class="relative mt-4">
            <!-- Ping animation wrapper -->
            <div class="w-3.5 h-3.5 bg-yellow-400 rounded-full shadow-[0_0_20px_rgba(250,204,21,0.9)] relative z-10">
            </div>
            <div class="absolute inset-0 bg-yellow-400 rounded-full animate-ping opacity-60"></div>
        </div>

    </div>

</body>

</html>
